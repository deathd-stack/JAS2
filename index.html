<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>TIGER MEMO VER 2.3</title>

<style>
  :root{
    --bg1:#f7e36a;
    --bg2:#f2d22a;
    --blue:#2f7df6;
    --red:#e20000;
    --line:#cfcfcf;
    --ui:.8;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    font-family:-apple-system, system-ui, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    font-weight:700;
    background:
      radial-gradient(1200px 700px at 50% -10%, #fff0a8 0%, transparent 55%),
      linear-gradient(180deg,var(--bg1),var(--bg2));
    min-height:100vh;
    overflow-x:hidden;
    color:#111;
  }

  header{
    text-align:center;
    padding:22px 14px 10px;
    user-select:none;
  }

  .titleWrap{
    display:flex;
    justify-content:center;
    align-items:baseline;
    gap:10px;
    flex-wrap:wrap;
  }

  .titleMain{
    font-size:42px;
    font-weight:1000;
    letter-spacing:-1px;
    text-transform:uppercase;
    line-height:1;
  }

  .titleVer{
    font-size:18px;
    font-weight:1000;
    opacity:.9;
    text-transform:uppercase;
  }

  .controls{
    display:flex;
    justify-content:center;
    gap:calc(14px * var(--ui));
    padding:calc(8px * var(--ui)) calc(14px * var(--ui)) calc(12px * var(--ui));
    flex-wrap:wrap;
  }

  button{
    border:none;
    border-radius:calc(22px * var(--ui));
    background:#fff;
    padding:calc(14px * var(--ui)) calc(22px * var(--ui));
    font-weight:1000;
    color:var(--blue);
    font-size:calc(18px * var(--ui));
    box-shadow:0 10px 20px rgba(0,0,0,.18);
    text-transform:uppercase;
    cursor:pointer;
  }

  button:active{transform:scale(.99)}

  #memoList{
    padding:calc(10px * var(--ui)) calc(14px * var(--ui)) calc(40px * var(--ui));
    max-width:780px;
    margin:0 auto;
  }

  .emptyMemo{
    background:rgba(255,255,255,.22);
    border-radius:calc(20px * var(--ui));
    padding:calc(18px * var(--ui));
    text-align:center;
    font-size:calc(16px * var(--ui));
    font-weight:1000;
  }

  .memoCard{
    background:rgba(246,231,215,.92);
    border-radius:calc(24px * var(--ui));
    padding:calc(14px * var(--ui)) calc(12px * var(--ui));
    margin:calc(12px * var(--ui)) 0;
    box-shadow:0 16px 26px rgba(0,0,0,.18);
    border:2px solid rgba(255,255,255,.45);
    overflow:hidden;
  }

  .memoRow{
    display:flex;
    gap:calc(10px * var(--ui));
    align-items:flex-start;
  }

  .selBox{
    width:calc(30px * var(--ui));
    height:calc(30px * var(--ui));
    border-radius:calc(10px * var(--ui));
    border:2px solid rgba(0,0,0,.28);
    background:#fff;
    appearance:none;
    margin-top:calc(8px * var(--ui));
    flex:0 0 auto;
    position:relative;
  }

  .selBox:checked{
    background:#fff;
    border-color:#1e63d8;
    box-shadow:0 0 0 calc(4px * var(--ui)) rgba(47,125,246,.14);
  }

  .selBox:checked::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width:calc(10px * var(--ui));
    height:calc(16px * var(--ui));
    border-right:calc(3px * var(--ui)) solid #1e63d8;
    border-bottom:calc(3px * var(--ui)) solid #1e63d8;
    transform:translate(-50%,-60%) rotate(45deg);
  }

  .lines{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:calc(10px * var(--ui));
    cursor:pointer;
    min-width:0;
  }

  .line{
    display:flex;
    align-items:flex-start;
    gap:calc(10px * var(--ui));
    min-width:0;
  }

  .tagPill{
    background:#111;
    color:#fff;
    border-radius:999px;
    padding:calc(9px * var(--ui)) calc(12px * var(--ui));
    font-weight:1000;
    font-size:calc(16px * var(--ui));
    min-width:calc(70px * var(--ui));
    text-align:center;
    flex:0 0 auto;
    text-transform:uppercase;
  }

  .textPill{
    background:rgba(210,199,188,.45);
    border-radius:999px;
    padding:calc(10px * var(--ui)) calc(14px * var(--ui));
    font-weight:1000;
    font-size:calc(18px * var(--ui));
    color:#111;
    flex:1;
    min-width:0;
    white-space:normal;
    overflow:visible;
    word-break:break-word;
    text-transform:uppercase;
  }

  .flash{animation:flash .55s;}
  @keyframes flash{50%{transform:scale(1.01); filter:brightness(1.05)}}

  .modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    display:none;
    justify-content:center;
    align-items:flex-end;
    z-index:50;
    overscroll-behavior:contain;
    pointer-events:none;
  }

  .box{
    width:100%;
    max-width:820px;
    background:#fff;
    border-radius:calc(26px * var(--ui)) calc(26px * var(--ui)) 0 0;
    padding:calc(10px * var(--ui)) calc(14px * var(--ui)) calc(16px * var(--ui));
    max-height:92vh;
    overflow:auto;
    transform:translateY(0);
    will-change:transform;
    -webkit-overflow-scrolling:touch;
    pointer-events:auto;
  }

  .dragArea{
    padding:calc(6px * var(--ui)) 0 calc(8px * var(--ui));
    position:sticky;
    top:0;
    background:#fff;
    z-index:2;
  }

  .drag-handle{
    width:calc(60px * var(--ui));
    height:calc(7px * var(--ui));
    background:#cfcfcf;
    border-radius:999px;
    margin:0 auto;
  }

  .modalTitleTap{
    text-align:center;
    font-weight:1000;
    color:#111;
    padding:calc(6px * var(--ui)) 0 calc(10px * var(--ui));
    user-select:none;
    text-transform:uppercase;
  }

  .modalTitleTap .m1{font-size:calc(18px * var(--ui));}
  .modalTitleTap .m2{font-size:calc(12px * var(--ui)); opacity:.55; margin-top:2px;}

  .section{
    background:#f2f2f2;
    border-radius:calc(16px * var(--ui));
    padding:calc(12px * var(--ui));
    margin:calc(10px * var(--ui)) 0;
    overflow:hidden;
    border:1px solid #e6e6e6;
  }

  .sectionHead{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom:calc(10px * var(--ui));
    gap:calc(10px * var(--ui));
  }

  .sectionTitle{
    font-size:calc(24px * var(--ui));
    font-weight:1000;
    letter-spacing:.3px;
    text-transform:uppercase;
  }

  .headRight{
    display:flex;
    align-items:flex-start;
    gap:calc(10px * var(--ui));
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .staStdWrap{
    display:flex;
    align-items:center;
    gap:calc(8px * var(--ui));
    white-space:nowrap;
  }

  .staStdLab{
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    color:#111;
    text-transform:uppercase;
  }

  .staStdInput{
    width:calc(92px * var(--ui)) !important;
    min-width:calc(92px * var(--ui));
    text-align:center;
  }

  .timeWrap{
    display:flex;
    align-items:baseline;
    gap:calc(10px * var(--ui));
    white-space:nowrap;
    text-transform:uppercase;
  }

  .timeBtn{
    border:none;
    background:transparent;
    box-shadow:none;
    padding:calc(4px * var(--ui)) calc(8px * var(--ui));
    margin:0;
    font-weight:1000;
    font-size:calc(16px * var(--ui));
    color:#111;
    border-radius:calc(10px * var(--ui));
    text-transform:uppercase;
  }

  .timeBtn:active{background:rgba(226,27,27,.08);}

  .timeVal{
    font-weight:1000;
    font-size:calc(22px * var(--ui));
    color:var(--red);
    min-width:calc(64px * var(--ui));
    text-align:right;
    font-variant-numeric:tabular-nums;
  }

  .row{
    display:flex;
    align-items:center;
    gap:calc(10px * var(--ui));
    margin:calc(10px * var(--ui)) 0;
    flex-wrap:nowrap;
    min-width:0;
  }

  .lab{
    font-size:calc(20px * var(--ui));
    font-weight:1000;
    min-width:calc(40px * var(--ui));
    color:#111;
    white-space:nowrap;
    text-transform:uppercase;
  }

  input, textarea, select{
    font-family:inherit;
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    border:2px solid var(--line);
    border-radius:calc(16px * var(--ui));
    outline:none;
    background:#fff;
    -webkit-text-size-adjust:100%;
    font-variant-numeric:tabular-nums;
    text-transform:uppercase;
  }

  input{
    width:100%;
    height:calc(54px * var(--ui));
    line-height:calc(54px * var(--ui));
    padding:0 calc(10px * var(--ui));
    text-align:center;
  }

  textarea{
    width:100%;
    height:calc(76px * var(--ui));
    resize:none;
    font-weight:800;
    padding:calc(10px * var(--ui));
    text-transform:none;
  }

  select{
    height:calc(54px * var(--ui));
    padding:0 calc(10px * var(--ui));
  }

  .numBox{
    font-size:calc(18px * var(--ui));
    letter-spacing:.6px;
  }

  .long{
    flex:1;
    min-width:0;
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    padding-left:calc(14px * var(--ui));
    text-align:left;
  }

  .fixedField{
    background:#f6f6f6;
    color:#111;
  }

  .extraBox{
    background:#fff;
    border:2px solid #e2e2e2;
    border-radius:calc(16px * var(--ui));
    padding:calc(12px * var(--ui));
    margin-top:calc(10px * var(--ui));
  }

  .extraHead{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:calc(10px * var(--ui));
    text-transform:uppercase;
  }

  .extraTitle{
    font-size:calc(20px * var(--ui));
    font-weight:1000;
    letter-spacing:.4px;
  }

  .iconBtn{
    width:calc(48px * var(--ui));
    height:calc(48px * var(--ui));
    border-radius:calc(16px * var(--ui));
    border:none;
    background:#fff;
    box-shadow:0 8px 18px rgba(0,0,0,.10);
    color:var(--blue);
    font-size:calc(28px * var(--ui));
    font-weight:1000;
    text-transform:uppercase;
  }

  .extraRow{
    display:flex;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin-top:calc(10px * var(--ui));
  }

  .extraRow select{
    width:calc(130px * var(--ui));
    font-size:calc(16px * var(--ui));
    font-weight:1000;
  }

  .extraRow input{
    width:calc(130px * var(--ui));
    font-size:calc(18px * var(--ui));
  }

  .minusBtn{
    width:calc(60px * var(--ui));
    height:calc(54px * var(--ui));
    border-radius:calc(16px * var(--ui));
    border:none;
    background:#eef1f7;
    color:var(--blue);
    font-weight:1000;
    font-size:calc(22px * var(--ui));
    box-shadow:none;
    text-transform:uppercase;
  }

  .bottomBtns{
    display:flex;
    gap:calc(18px * var(--ui));
    padding:calc(12px * var(--ui)) calc(6px * var(--ui)) 0;
    justify-content:flex-start;
    text-transform:uppercase;
    flex-wrap:wrap;
  }

  .bottomBtns button{
    padding:calc(10px * var(--ui)) calc(14px * var(--ui));
    font-size:calc(16px * var(--ui));
    box-shadow:none;
    border-radius:calc(14px * var(--ui));
  }

  .rowGrid3{
    display:grid;
    grid-template-columns:
      calc(26px * var(--ui)) 1.1fr
      calc(20px * var(--ui)) 1fr
      calc(14px * var(--ui)) .95fr;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin:calc(10px * var(--ui)) 0;
    min-width:0;
  }

  .rowGridTDBB{
    display:grid;
    grid-template-columns:
      calc(18px * var(--ui)) 1fr
      calc(18px * var(--ui)) .9fr
      calc(26px * var(--ui)) .9fr;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin:calc(10px * var(--ui)) 0;
    min-width:0;
  }

  .rowGridTTTB{
    display:grid;
    grid-template-columns:
      calc(26px * var(--ui)) 1fr
      calc(26px * var(--ui)) 1fr;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin:calc(10px * var(--ui)) 0;
    min-width:0;
  }

  .outTimeBox{
    background:#fff;
    border:2px solid #e2e2e2;
    border-radius:calc(16px * var(--ui));
    padding:calc(12px * var(--ui));
    margin:calc(10px * var(--ui)) 0;
  }

  .outTimeTitle{
    font-size:calc(20px * var(--ui));
    font-weight:1000;
    letter-spacing:.4px;
    margin-bottom:calc(12px * var(--ui));
    text-transform:uppercase;
    color:#111;
  }

  .outTimeGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:calc(10px * var(--ui));
  }

  .outTimeItem{
    border:1px solid #ececec;
    border-radius:calc(14px * var(--ui));
    padding:calc(10px * var(--ui));
    background:#fff;
    min-width:0;
  }

  .outTimeLabel{
    font-size:calc(13px * var(--ui));
    font-weight:1000;
    color:#666;
    line-height:1.2;
    text-transform:uppercase;
    margin-bottom:calc(6px * var(--ui));
  }

  .outTimeKor{
    display:block;
    font-size:calc(11px * var(--ui));
    color:#8a8a8a;
    margin-top:calc(3px * var(--ui));
    text-transform:none;
  }

  .outTimeInline{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:calc(8px * var(--ui));
  }

  .outMiniBtn{
    border:none;
    background:transparent;
    box-shadow:none;
    padding:calc(4px * var(--ui)) calc(6px * var(--ui));
    margin:0;
    font-weight:1000;
    font-size:calc(15px * var(--ui));
    color:#111;
    border-radius:calc(10px * var(--ui));
    text-transform:uppercase;
  }

  .outMiniBtn:active{
    background:rgba(226,27,27,.08);
  }

  .outMiniVal{
    min-width:calc(66px * var(--ui));
    text-align:right;
    font-size:calc(20px * var(--ui));
    font-weight:1000;
    color:var(--red);
    font-variant-numeric:tabular-nums;
    cursor:pointer;
  }

  .outMiniVal.empty{
    color:#999;
  }

  @media (max-width:520px){
    .outTimeGrid{
      grid-template-columns:1fr;
    }
  }
</style>
</head>

<body>

<header>
  <div class="titleWrap">
    <div class="titleMain">TIGER MEMO</div>
    <div class="titleVer">VER 2.3</div>
  </div>
</header>

<div class="controls">
  <button type="button" onclick="newMemo()">ADD</button>
  <button type="button" onclick="deleteSelected()">DELETE</button>
</div>

<div id="memoList"></div>

<div class="modal" id="modal" aria-hidden="true">
  <div class="box" id="sheet" role="dialog" aria-modal="true">
    <div class="dragArea" id="dragArea">
      <div class="drag-handle"></div>
    </div>

    <div class="modalTitleTap">
      <div class="m1">TIGER MEMO</div>
      <div class="m2">MEMO SETTINGS</div>
    </div>

    <div id="sections"></div>

    <div class="bottomBtns">
      <button type="button" onclick="saveMemo()">SAVE</button>
      <button type="button" onclick="closeModal()">CLOSE</button>
    </div>
  </div>
</div>

<script>
  const modal = document.getElementById("modal");
  const sheet = document.getElementById("sheet");
  const dragArea = document.getElementById("dragArea");
  const sections = document.getElementById("sections");
  const memoList = document.getElementById("memoList");

  let memos = JSON.parse(localStorage.getItem("tiger_memos_simple_v23") || "[]");
  let editId = null;

  const EXTRA_KEYS = ["CREW","C","W","TS"];
  const OUTBOUND_TIME_FIELDS = [
    { key:"rampTeam", label:"RAMP TEAM AT PLANESIDE (-60)", kor:"램프팀 기재 옆 도착" },
    { key:"cargo", label:"CARGO AT PLANESIDE (-60)", kor:"화물 기재 옆 도착" },
    { key:"loadingCommence", label:"LOADING COMMENCE", kor:"적재 시작" },
    { key:"firstBag", label:"1ST BAG PLANESIDE", kor:"첫 수하물 도착" },
    { key:"loadingFinished", label:"LOADING FINISHED", kor:"적재 완료" },
    { key:"finalBag", label:"FINAL BAG AT PLANESIDE", kor:"마지막 수하물 도착" },
    { key:"refuelTruck", label:"REFUELING TRUCK AT PLANESIDE", kor:"주유차 기재 옆 도착" },
    { key:"refuelCommence", label:"REFUELING COMMENCE", kor:"주유 시작" },
    { key:"refuelFinished", label:"REFUELING FINISHED", kor:"주유 완료" }
  ];

  function onlyNum(val, len){
    return (val || "").replace(/[^0-9]/g, "").slice(0, len);
  }

  function pad(val, len){
    const v = onlyNum(val, len);
    return v ? v.padStart(len, "0") : "";
  }

  function nowTime(){
    const d = new Date();
    return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
  }

  function normalizeTimeInput(val){
    const raw = (val || "").trim();
    if(!raw) return "";
    const digits = raw.replace(/[^0-9]/g, "");
    if(digits.length === 3){
      return digits.slice(0,1) + ":" + digits.slice(1,3);
    }
    if(digits.length >= 4){
      return digits.slice(0,2) + ":" + digits.slice(2,4);
    }
    return raw.slice(0,5);
  }

  function askTime(cur=""){
    const t = prompt("TIME 입력 (예: 23:24 또는 2324)", cur || nowTime());
    if(t === null) return null;
    return normalizeTimeInput(t);
  }

  document.addEventListener("input", (e)=>{
    const t = e.target;
    if(!(t instanceof HTMLInputElement)) return;
    const k = t.dataset.k || "";
    if(!k) return;

    if(k === "SHARED-B"){
      t.value = onlyNum(t.value, 5);
      document.querySelectorAll('input[data-k="SHARED-B"]').forEach(el=>{
        if(el !== t) el.value = t.value;
      });
      return;
    }

    if(k === "SHARED-HASH"){
      t.value = onlyNum(t.value, 3);
      document.querySelectorAll('input[data-k="SHARED-HASH"]').forEach(el=>{
        if(el !== t) el.value = t.value;
      });
      return;
    }

    if(k.endsWith("-STA")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-STD")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-t")) t.value = onlyNum(t.value, 3);
    if(k.endsWith("-d")) t.value = onlyNum(t.value, 2);
    if(k.endsWith("-bb")) t.value = onlyNum(t.value, 2);
    if(k.endsWith("-tt")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-tb")) t.value = onlyNum(t.value, 4);
    if(k.startsWith("extraVal-")) t.value = onlyNum(t.value, 3);
  });

  function makeExtraRow(type, key="CREW", val=""){
    const row = document.createElement("div");
    row.className = "extraRow";
    row.innerHTML = `
      <select>
        ${EXTRA_KEYS.map(k => `<option value="${k}" ${k===key ? "selected" : ""}>${k}</option>`).join("")}
      </select>
      <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="extraVal-${type}" value="${onlyNum(val,3)}">
      <button type="button" class="minusBtn" onclick="this.parentElement.remove()">-</button>
    `;
    return row;
  }

  function addExtraRow(type){
    const root = sections.querySelector(`.section[data-type="${type}"]`);
    const box = root ? root.querySelector(`#${type}-EXTRAS`) : null;
    if(!box) return;
    box.appendChild(makeExtraRow(type, "CREW", ""));
  }

  function makeOutboundTimeBox(saved = {}){
    const wrap = document.createElement("div");
    wrap.className = "outTimeBox";

    wrap.innerHTML = `
      <div class="outTimeTitle">TIME</div>
      <div class="outTimeGrid">
        ${OUTBOUND_TIME_FIELDS.map(f => {
          const val = saved[f.key] || "";
          return `
            <div class="outTimeItem">
              <div class="outTimeLabel">
                ${f.label}
                <span class="outTimeKor">${f.kor}</span>
              </div>
              <div class="outTimeInline">
                <button type="button" class="outMiniBtn" data-outtime-btn="${f.key}">TIME</button>
                <div class="outMiniVal ${val ? "" : "empty"}" data-outtime-val="${f.key}">${val || "--:--"}</div>
              </div>
            </div>
          `;
        }).join("")}
      </div>
    `;

    wrap.querySelectorAll("[data-outtime-btn]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const key = btn.dataset.outtimeBtn;
        const valBox = wrap.querySelector(`[data-outtime-val="${key}"]`);
        if(valBox){
          valBox.textContent = nowTime();
          valBox.classList.remove("empty");
        }
      });

      btn.addEventListener("dblclick", ()=>{
        const key = btn.dataset.outtimeBtn;
        const valBox = wrap.querySelector(`[data-outtime-val="${key}"]`);
        if(!valBox) return;
        const cur = valBox.textContent === "--:--" ? "" : valBox.textContent;
        const t = askTime(cur);
        if(t !== null){
          valBox.textContent = t || "--:--";
          valBox.classList.toggle("empty", !t);
        }
      });
    });

    wrap.querySelectorAll("[data-outtime-val]").forEach(valBox=>{
      valBox.addEventListener("click", ()=>{
        const cur = valBox.textContent === "--:--" ? "" : valBox.textContent;
        const t = askTime(cur);
        if(t !== null){
          valBox.textContent = t || "--:--";
          valBox.classList.toggle("empty", !t);
        }
      });
    });

    return wrap;
  }

  function makeSection(type, memoData){
    const d = document.createElement("div");
    d.className = "section";
    d.dataset.type = type;

    const savedTime = memoData ? (memoData[type+"-TIME"] || "") : "";
    const sharedB = memoData ? (memoData.sharedB || "") : "";
    const sharedHASH = memoData ? (memoData.sharedHASH || "") : "";
    const v = (k)=> memoData ? (memoData[type+"-"+k] || "") : "";
    const noteV = memoData ? (memoData[type+"-note"] || "") : "";
    const staStdLabel = type === "INBOUND" ? "STA" : "STD";
    const staStdKey = type === "INBOUND" ? "STA" : "STD";
    const fixedItText = type === "INBOUND" ? "IT602" : "IT603";
    const cmpt1Value = memoData ? (memoData[type+"-cmpt1"] || "F3") : "F3";

    d.innerHTML = `
      <div class="sectionHead">
        <div class="sectionTitle">${type}</div>
        <div class="headRight">
          <div class="staStdWrap">
            <div class="staStdLab">${staStdLabel}</div>
            <input class="numBox staStdInput" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-${staStdKey}" value="${v(staStdKey)}">
          </div>
          <div class="timeWrap">
            <button type="button" class="timeBtn" data-timebtn="${type}">TIME</button>
            <div class="timeVal" id="${type}-TIMESHOWN">${savedTime || "--:--"}</div>
          </div>
        </div>
      </div>

      <div class="rowGrid3">
        <div class="lab">IT</div>
        <input class="long fixedField" value="${fixedItText}" readonly tabindex="-1">
        <div class="lab">B</div>
        <input class="numBox" inputmode="numeric" maxlength="5" placeholder="00000" data-k="SHARED-B" value="${sharedB}">
        <div class="lab">#</div>
        <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="SHARED-HASH" value="${sharedHASH}">
      </div>

      <div class="row">
        <div class="lab" style="min-width:96px;">CMPT 1</div>
        <input class="long" data-k="${type}-cmpt1" value="${cmpt1Value}" placeholder="F3">
      </div>

      <div class="row">
        <div class="lab" style="min-width:96px;">CMPT 3</div>
        <input class="long" data-k="${type}-cmpt2" placeholder="TEXT" value="${memoData ? (memoData[type+"-cmpt2"] || "") : ""}">
      </div>

      <div class="row">
        <div class="lab" style="min-width:96px;">CMPT 4</div>
        <input class="long" data-k="${type}-cmpt3" placeholder="TEXT" value="${memoData ? (memoData[type+"-cmpt3"] || "") : ""}">
      </div>

      <div class="row">
        <div class="lab" style="min-width:96px;">CMPT 5</div>
        <input class="long" data-k="${type}-cmpt4" placeholder="TEXT" value="${memoData ? (memoData[type+"-cmpt4"] || "") : ""}">
      </div>

      <div class="rowGridTDBB">
        <div class="lab">T</div>
        <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="${type}-t" value="${v("t")}">
        <div class="lab">D</div>
        <input class="numBox" inputmode="numeric" maxlength="2" placeholder="00" data-k="${type}-d" value="${v("d")}">
        <div class="lab">BB</div>
        <input class="numBox" inputmode="numeric" maxlength="2" placeholder="00" data-k="${type}-bb" value="${v("bb")}">
      </div>

      ${type === "OUTBOUND" ? `
      <div class="rowGridTTTB">
        <div class="lab">T/T</div>
        <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-tt" value="${v("tt")}">
        <div class="lab">T/B</div>
        <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-tb" value="${v("tb")}">
      </div>
      ` : ""}

      <div class="extraBox">
        <div class="extraHead">
          <div class="extraTitle">EXTRA</div>
          <button type="button" class="iconBtn" onclick="addExtraRow('${type}')">+</button>
        </div>
        <div id="${type}-EXTRAS"></div>
      </div>

      <textarea data-k="${type}-note" placeholder="NOTE (${type})">${noteV}</textarea>
    `;

    const timeBtn = d.querySelector(`[data-timebtn="${type}"]`);
    const timeShown = d.querySelector(`#${type}-TIMESHOWN`);

    timeBtn.addEventListener("click", ()=>{
      timeShown.textContent = nowTime();
    });

    timeShown.addEventListener("click", ()=>{
      const cur = timeShown.textContent === "--:--" ? "" : timeShown.textContent;
      const t = askTime(cur);
      if(t !== null){
        timeShown.textContent = t || "--:--";
      }
    });

    timeBtn.addEventListener("dblclick", ()=>{
      const cur = timeShown.textContent === "--:--" ? "" : timeShown.textContent;
      const t = askTime(cur);
      if(t !== null){
        timeShown.textContent = t || "--:--";
      }
    });

    const extrasBox = d.querySelector(`#${type}-EXTRAS`);
    const extras = memoData ? (memoData[type+"-EXTRAS"] || []) : [];
    extras.forEach(ex => extrasBox.appendChild(makeExtraRow(type, ex.key, ex.val)));

    return d;
  }

  function buildEditor(memoData){
    sections.innerHTML = "";

    const inboundSection = makeSection("INBOUND", memoData);
    sections.appendChild(inboundSection);

    const timeBox = makeOutboundTimeBox(memoData ? (memoData["OUTBOUND-TIMES"] || {}) : {});
    sections.appendChild(timeBox);

    const outboundSection = makeSection("OUTBOUND", memoData);
    sections.appendChild(outboundSection);
  }

  function newMemo(){
    editId = null;
    buildEditor(null);
    openModal();
  }

  function openModal(){
    modal.style.display = "flex";
    modal.setAttribute("aria-hidden","false");
    sheet.style.transform = "translateY(0)";
    currentTranslate = 0;
  }

  function closeModal(){
    modal.style.display = "none";
    modal.setAttribute("aria-hidden","true");
    editId = null;
  }

  function saveMemo(){
    const data = { id: editId ?? Date.now() };

    data.sharedB = pad(document.querySelector('input[data-k="SHARED-B"]')?.value || "", 5);
    data.sharedHASH = pad(document.querySelector('input[data-k="SHARED-HASH"]')?.value || "", 3);

    ["INBOUND","OUTBOUND"].forEach(type=>{
      const root = sections.querySelector(`.section[data-type="${type}"]`);
      if(!root) return;

      const gi = (k)=> root.querySelector(`input[data-k="${type}-${k}"]`);
      const cm = (n)=> root.querySelector(`input[data-k="${type}-cmpt${n}"]`);
      const note = root.querySelector(`textarea[data-k="${type}-note"]`);

      data[type+"-STA"] = type==="INBOUND" ? pad(gi("STA")?.value, 4) : "";
      data[type+"-STD"] = type==="OUTBOUND" ? pad(gi("STD")?.value, 4) : "";

      data[type+"-t"]  = pad(gi("t")?.value, 3);
      data[type+"-d"]  = pad(gi("d")?.value, 2);
      data[type+"-bb"] = pad(gi("bb")?.value, 2);
      data[type+"-tt"] = type==="OUTBOUND" ? pad(gi("tt")?.value, 4) : "";
      data[type+"-tb"] = type==="OUTBOUND" ? pad(gi("tb")?.value, 4) : "";

      data[type+"-cmpt1"] = (cm(1)?.value || "F3").trim() || "F3";
      data[type+"-cmpt2"] = cm(2)?.value || "";
      data[type+"-cmpt3"] = cm(3)?.value || "";
      data[type+"-cmpt4"] = cm(4)?.value || "";

      data[type+"-note"] = note ? (note.value || "") : "";

      const shown = document.getElementById(type+"-TIMESHOWN");
      const shownVal = shown ? shown.textContent : "";
      data[type+"-TIME"] = shownVal === "--:--" ? "" : shownVal;
      
      const extras = [];
      const box = root.querySelector(`#${type}-EXTRAS`);
      if(box){
        [...box.querySelectorAll(".extraRow")].forEach(r=>{
          const key = (r.querySelector("select")?.value || "").toUpperCase();
          const val = pad(r.querySelector("input")?.value || "", 3);
          if(key && val) extras.push({key, val});
        });
      }
      data[type+"-EXTRAS"] = extras;
    });

    const outTimes = {};
    sections.querySelectorAll("[data-outtime-val]").forEach(el=>{
      const key = el.dataset.outtimeVal;
      const val = el.textContent === "--:--" ? "" : el.textContent;
      outTimes[key] = normalizeTimeInput(val || "");
    });
    data["OUTBOUND-TIMES"] = outTimes;

    if(editId){
      const idx = memos.findIndex(m=>m.id===editId);
      if(idx >= 0) memos[idx] = data;
    }else{
      memos.push(data);
    }

    localStorage.setItem("tiger_memos_simple_v23", JSON.stringify(memos));
    closeModal();
    renderList(data.id);
  }

  function formatTitleLine(m, type){
    const b = (m.sharedB || "").trim();
    const hash = (m.sharedHASH || "").trim();
    const it = type === "INBOUND" ? "IT602" : "IT603";

    const staOrStd = type === "INBOUND"
      ? (m["INBOUND-STA"] || "").trim()
      : (m["OUTBOUND-STD"] || "").trim();

    const cmpt1 = (m[type+"-cmpt1"] || "").trim();
    const cmpt2 = (m[type+"-cmpt2"] || "").trim();
    const cmpt3 = (m[type+"-cmpt3"] || "").trim();
    const cmpt4 = (m[type+"-cmpt4"] || "").trim();

    const td = [
      (m[type+"-t"] || "").trim(),
      (m[type+"-d"] || "").trim(),
      (m[type+"-bb"] || "").trim()
    ].filter(Boolean).join("/");

    const ttTb = type === "OUTBOUND"
      ? [(m["OUTBOUND-tt"] || "").trim(), (m["OUTBOUND-tb"] || "").trim()].filter(Boolean).join("/")
      : "";

    const extras = (m[type+"-EXTRAS"] || [])
      .map(x => `${x.key}${x.val}`)
      .join(" ");

    const bits = [];
    if(type === "INBOUND"){
      bits.push(`${it} B[${b}]`);
    }else{
      bits.push(`${it} #[${hash}]`);
    }
    if(staOrStd) bits.push(staOrStd);
    if(cmpt1) bits.push(cmpt1);
    if(cmpt2) bits.push(cmpt2);
    if(cmpt3) bits.push(cmpt3);
    if(cmpt4) bits.push(cmpt4);
    if(td) bits.push(td);
    if(ttTb) bits.push(ttTb);
    if(extras) bits.push(extras);

    return bits.join(" ");
  }

  function renderList(flashId){
    memoList.innerHTML = "";

    if(!memos.length){
      memoList.innerHTML = `<div class="emptyMemo">NO MEMO</div>`;
      return;
    }

    memos.forEach(m=>{
      const card = document.createElement("div");
      card.className = "memoCard" + (m.id===flashId ? " flash" : "");
      card.innerHTML = `
        <div class="memoRow">
          <input class="selBox" type="checkbox" data-id="${m.id}">
          <div class="lines" data-open="${m.id}">
            <div class="line"><div class="tagPill">IN</div><div class="textPill">${formatTitleLine(m, "INBOUND")}</div></div>
            <div class="line"><div class="tagPill">OUT</div><div class="textPill">${formatTitleLine(m, "OUTBOUND")}</div></div>
          </div>
        </div>
      `;
      memoList.appendChild(card);
    });

    memoList.querySelectorAll("[data-open]").forEach(el=>{
      el.addEventListener("click", ()=>{
        const id = Number(el.getAttribute("data-open"));
        editMemo(id);
      });
    });
  }

  function editMemo(id){
    const m = memos.find(x=>x.id===id);
    if(!m) return;
    editId = id;
    buildEditor(m);
    document.querySelectorAll('input[data-k="SHARED-B"]').forEach(el => el.value = m.sharedB || "");
    document.querySelectorAll('input[data-k="SHARED-HASH"]').forEach(el => el.value = m.sharedHASH || "");
    openModal();
  }

  function deleteSelected(){
    const checks = document.querySelectorAll('.selBox:checked');
    const ids = [...checks].map(c=>Number(c.dataset.id));
    if(!ids.length){
      alert("SELECT MEMO");
      return;
    }
    memos = memos.filter(m=>!ids.includes(m.id));
    localStorage.setItem("tiger_memos_simple_v23", JSON.stringify(memos));
    renderList();
  }

  let startY = 0;
  let currentTranslate = 0;
  let dragging = false;

  function onStart(y){
    dragging = true;
    startY = y;
    sheet.style.transition = "none";
  }

  function onMove(y){
    if(!dragging) return;
    const dy = Math.max(0, y - startY);
    currentTranslate = dy;
    sheet.style.transform = `translateY(${dy}px)`;
  }

  function onEnd(){
    if(!dragging) return;
    dragging = false;
    sheet.style.transition = "transform .18s ease";
    if(currentTranslate > 140){
      closeModal();
    }else{
      sheet.style.transform = "translateY(0)";
      currentTranslate = 0;
    }
  }

  dragArea.addEventListener("touchstart", (e)=> onStart(e.touches[0].clientY), {passive:true});
  dragArea.addEventListener("touchmove",  (e)=> onMove(e.touches[0].clientY),  {passive:true});
  dragArea.addEventListener("touchend",   ()=> onEnd());

  dragArea.addEventListener("mousedown", (e)=> onStart(e.clientY));
  window.addEventListener("mousemove", (e)=> onMove(e.clientY));
  window.addEventListener("mouseup", ()=> onEnd());

  renderList();
</script>

</body>
</html>
